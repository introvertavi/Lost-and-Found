<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback | Lost & Found</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div id="navbar"></div>

<!-- HERO -->
<section class="container hero text-center my-5">
<h1 class="fw-bold">
<i class="bi bi-chat-square-heart"></i> Feedback
</h1>
<p class="hero-subtitle">
Help us improve the Lost & Found portal.
</p>
</section>

<!-- FEEDBACK CARD -->
<section class="container my-5">
<div class="row justify-content-center">
<div class="col-md-7">

<div class="card shadow-sm p-4 rounded-4">

<h4 class="fw-bold mb-4 text-center">Rate Your Experience</h4>

<!-- INFO BOXES (NOW PROPER ONE LINE) -->
<div class="row text-center mb-4 g-3">

<div class="col-12 col-md-4">
<div class="p-3 shadow-sm rounded bg-white h-100">
<h5>🔒 Secure</h5>
<p class="small text-muted mb-0">
Improves system safety.
</p>
</div>
</div>

<div class="col-12 col-md-4">
<div class="p-3 shadow-sm rounded bg-white h-100">
<h5>⚡ Fast</h5>
<p class="small text-muted mb-0">
Helps us update quickly.
</p>
</div>
</div>

<div class="col-12 col-md-4">
<div class="p-3 shadow-sm rounded bg-white h-100">
<h5>❤️ User First</h5>
<p class="small text-muted mb-0">
Shapes future features.
</p>
</div>
</div>

</div>


<!-- FORM -->
<form id="feedbackForm">

<div class="mb-3">
<label class="form-label">Rating</label>

<select class="form-select">
<option>⭐⭐⭐⭐⭐ Excellent</option>
<option>⭐⭐⭐⭐ Good</option>
<option>⭐⭐⭐ Average</option>
<option>⭐⭐ Poor</option>
</select>

</div>

<div class="mb-3">
<label class="form-label">Feedback</label>

<textarea class="form-control" rows="4"
placeholder="Write your feedback..."></textarea>

</div>

<button class="btn btn-danger w-100">
Submit Feedback
</button>

</form>

</div>
</div>
</div>
</section>

<!-- FOOTER -->
<footer class="footer mt-5">
<div class="container text-center">
<div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
<p class="mb-1 fw-semibold">Lost & Found Portal</p>
<p class="mb-1">
Helping users recover lost belongings safely and securely.
</p>
<p class="small mb-0">
© 2026 | Web Technology Project 
</p>
</div>
</div>
</footer>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

<!-- SUCCESS MESSAGE SCRIPT -->
<script>

document.getElementById("feedbackForm").addEventListener("submit",function(e){

e.preventDefault();

this.innerHTML = `
<div class="text-center p-4">
<h4 class="text-success">✅ Thank you for your feedback!</h4>
<p class="text-muted">Your response helps improve the portal.</p>
</div>
`;

});

</script>

</body>
</html>
